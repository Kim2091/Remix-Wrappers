; ================================================================
; DX9 FFP Proxy - Runtime Configuration
;
; Place this file next to d3d9.dll in the game directory.
; ================================================================

[Remix]
; Chain-load RTX Remix's d3d9 DLL after our proxy.
; Set Enabled=0 to disable chain loading (proxy only, no Remix).
Enabled=0

; Name of the Remix DLL to load. Typically d3d9_remix.dll for
; Remix runtime builds, or dxvk-remix.dll for some setups.
DLLName=d3d9_remix.dll

[Chain]
; Side-effect DLLs to load at startup (e.g. SilentPatch, mods).
; Set to empty or remove to skip.
PreloadDLL=

[FFP]
; Which texture stage holds the albedo/diffuse texture.
; Some engines bind the main texture to stage 1+ instead of stage 0.
; The proxy will copy it to stage 0 for FFP draws.
; Use diagnostic logging + the analysis scripts to discover this.
; Common values: 0 (most engines), 1 (some Japanese engines)
AlbedoStage=0

; Skip fake shadow meshes — planar overlays that use gray vertex colors
; to simulate shadows. These conflict with RTX Remix ray-traced shadows.
; 0 = disabled (render fake shadows normally), 1 = skip them
SkipFakeShadows=1

[Lights]
; Extract game engine point lights and submit via D3D9 SetLight/LightEnable.
; RTX Remix intercepts these calls for path-traced lighting.
; Set to 0 to disable light extraction entirely.
Enabled=1

; Light intensity multiplier as integer percentage.
; 100 = 1.0x (default), 150 = 1.5x, 50 = 0.5x
IntensityPercent=100

; How to determine point light range:
;   0 = Use NiLight Spec.r directly (actual range value, per Wall_SoGB)
;   1 = Calculate from attenuation equation (solve for 1/255 falloff)
;   2 = INFINITY (let Remix determine range from attenuation)
RangeMode=0
