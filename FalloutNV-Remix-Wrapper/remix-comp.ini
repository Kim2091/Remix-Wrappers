; remix-comp configuration — Fallout: New Vegas
; Ported from FNV_proxy to remix-comp framework

[Remix]
Enabled=0
DLLName=d3d9_remix.dll

[Chain]
PreloadDLL=

; ============================================================
; FFP Conversion Settings
; ============================================================
[FFP]
Enabled=1
AlbedoStage=0
; Per-decl-shape overrides — edit these between launches to tune.
; Stage values are 0-7 (which texture stage holds the diffuse for that mesh class).
TerrainAlbedoStage=3
BIAlbedoStage=1

; ============================================================
; Skinning
;
; FNV uses game-specific skinning (declaration cloning + engine hooks)
; instead of the generic skinning module. Keep this OFF.
; ============================================================
[Skinning]
Enabled=1

; ============================================================
; Culling (Wall_SoGB's disable-culling patch, ported from NewVegasRTXHelper)
;
; Forces BSCullingProcess to visit every NiAVObject instead of
; frustum/portal-rejecting them. Lets RTX Remix see off-screen
; geometry so reflections, GI, and shadow rays work correctly.
;
; Writes to fixed FNV addresses (0x8743A6 + 0x101E330) — only enable
; on the standard Steam/GOG executable. No effect (other than perf
; cost) if Remix isn't loaded.
; ============================================================
[Culling]
Enabled=0

; ============================================================
; Point Light Extraction
;
; Reads ShadowSceneNode point lights and submits via D3D9
; SetLight/LightEnable. RTX Remix intercepts for path tracing.
; ============================================================
[Lights]
Enabled=1
IntensityPercent=100

; Range mode:
;   0 = Use NiLight Spec.r directly (actual range value)
;   1 = Calculate from attenuation equation (1/255 falloff)
;   2 = INFINITY (let Remix determine range)
RangeMode=0

; ============================================================
; Diagnostic Logging
; ============================================================
[Diagnostics]
Enabled=0
DelayMs=300000
LogFrames=3

; ============================================================
; Frame Tracer
; ============================================================
[Tracer]
BacktraceDepth=8
OutputDir=captures

; ============================================================
; Sun / Moon time-of-day passthrough
;
; Each frame, reads the engine's sun/moon scene-graph orientation
; and pushes it to Remix via rtx.atmosphere.sun*/moon0.* config vars.
; Set Enabled=0 to leave Remix's atmosphere using its own defaults.
; ============================================================
[SunCycle]
Enabled=1

[MoonCycle]
Enabled=1
