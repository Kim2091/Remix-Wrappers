[Chain]
; PreloadDLL: Load a DLL at startup for its side effects (memory patches).
; Rename steam006's d3d9.dll to d3d9_steam006.dll and set the name here.
; The DLL's DllMain runs (applying game fixes) but it stays out of the D3D9 call chain.
PreloadDLL=d3d9_steam006.dll

[Remix]
; Set Enabled=1 to chain RTX Remix (d3d9_remix.dll) after this proxy.
; Set Enabled=0 to use the system d3d9.dll directly.
; Rename Remix's d3d9.dll to d3d9_remix.dll and place it next to this proxy.
Enabled=1

[FFP]
; AlbedoStage: which texture stage the game binds the albedo/diffuse texture to.
; If everything shows one texture, try 1, 2, 3 etc. Check the log for texture
; stage values per DIP call (tex0=, tex1=, ...) to find the varying one.
; Default: 0 (use stage 0 as-is)
AlbedoStage=0
